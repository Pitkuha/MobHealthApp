server:
  port: ${PORT:4000}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mob_health}
    username: ${DB_USER:pitkuha}
    password: ${DB_PASSWORD:}
  flyway:
    baseline-on-migrate: true
    baseline-version: 2
  jackson:
    default-property-inclusion: non_null

app:
  jwt-secret: ${JWT_SECRET:change_this_secret}
  jwt-expires-in: ${JWT_EXPIRES_IN:7d}
  cors-origin: ${CORS_ORIGIN:http://localhost:8081,http://localhost:5173,http://localhost:19006}
